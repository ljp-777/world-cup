<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026世界杯 夺冠预测</title>
<style>
  :root{
    --pitch:#071a12;
    --pitch2:#0d3d28;
    --chalk:#f4f1e8;
    --gold:#f2c94c;
    --gold2:#b68a1d;
    --line:#2f7650;
    --ink:#0b2014;
    --red-card:#b3231a;
    --panel:rgba(10,38,26,.82);
    --glass:rgba(255,255,255,.08);
    --cyan:#56d6ff;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 12% 8%, rgba(242,201,76,.24), transparent 28%),
      radial-gradient(circle at 86% 16%, rgba(86,214,255,.16), transparent 30%),
      linear-gradient(135deg, #04110c 0%, var(--pitch) 42%, #03100a 100%);
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
      repeating-linear-gradient(90deg, rgba(11,61,36,.6) 0px, rgba(11,61,36,.6) 72px, rgba(15,81,50,.54) 72px, rgba(15,81,50,.54) 144px);
    background-size:44px 44px,44px 44px,auto;
    color:var(--chalk);
    font-family:'Trebuchet MS','PingFang SC','Microsoft YaHei',sans-serif;
    padding:28px;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    inset:18px;
    pointer-events:none;
    border:2px solid rgba(244,241,232,.18);
    border-radius:28px;
    box-shadow:inset 0 0 0 1px rgba(242,201,76,.12), inset 0 0 80px rgba(0,0,0,.34);
    z-index:-1;
  }
  .page-shell{max-width:1760px;margin:0 auto;}
  .hero{
    position:relative;
    overflow:hidden;
    border:1px solid rgba(242,201,76,.42);
    border-radius:20px;
    padding:22px 26px;
    margin-bottom:18px;
    background:
      radial-gradient(circle at 92% 0%, rgba(242,201,76,.18), transparent 30%),
      linear-gradient(120deg, rgba(9,39,25,.96), rgba(10,54,36,.82));
    box-shadow:0 16px 48px rgba(0,0,0,.34), inset 0 0 50px rgba(242,201,76,.06);
  }
  .hero::after{
    content:"";
    position:absolute;
    right:-120px;
    top:-120px;
    width:220px;
    height:220px;
    border-radius:50%;
    border:28px solid rgba(242,201,76,.08);
  }
  .hero-top{position:relative;z-index:1;display:block;}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border:1px solid rgba(242,201,76,.45);border-radius:999px;background:rgba(0,0,0,.22);color:#ffe28a;font-size:12px;letter-spacing:2px;}
  h1{
    font-size:clamp(28px,3.2vw,46px);
    line-height:1.12;
    text-align:left;
    letter-spacing:2px;
    margin:12px 0 8px;
    text-transform:uppercase;
    text-shadow:0 10px 24px rgba(0,0,0,.45);
  }
  h1 span{color:var(--gold);}
  .subtitle{
    max-width:760px;
    text-align:left;
    font-size:14px;
    line-height:1.65;
    color:#d5eadc;
    margin-bottom:0;
    letter-spacing:1px;
  }
  .hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;}
  .ghost-btn,.settings-btn{
    border:none;
    padding:12px 20px;
    border-radius:999px;
    font-size:13px;
    font-weight:bold;
    letter-spacing:1px;
    cursor:pointer;
    transition:.2s ease;
  }
  .ghost-btn{background:rgba(255,255,255,.1);color:var(--chalk);border:1px solid rgba(255,255,255,.2);text-decoration:none;display:inline-flex;align-items:center;}
  .ghost-btn:hover,.settings-btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(0,0,0,.25);}
  .toolbar{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:0 0 24px;}
  .steps-guide{
    display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:0 0 20px;
    padding:14px 20px;
    background:rgba(15,50,34,.85);
    border:1px solid rgba(242,201,76,.35);
    border-radius:12px;
  }
  .step-item{
    display:flex;align-items:center;gap:7px;font-size:14px;color:var(--chalk);font-weight:bold;
  }
  .step-num{
    display:inline-flex;align-items:center;justify-content:center;
    width:26px;height:26px;border-radius:50%;
    background:var(--gold);color:#23260a;font-weight:bold;font-size:13px;
    flex-shrink:0;
  }
  .step-item.done .step-num{background:#5a8a66;color:#fff;}
  .step-arrow{color:rgba(242,201,76,.4);font-size:18px;font-weight:bold;}
  .next-action{
    max-width:700px;margin:0 auto 18px;text-align:center;
    background:rgba(242,201,76,.12);
    border:1px solid rgba(242,201,76,.4);
    border-radius:10px;
    padding:10px 16px;
    font-size:13px;
    color:#ffe28a;
    font-weight:bold;
    letter-spacing:.5px;
  }
  .settings-btn.pulse{
    animation:btnPulse 1.6s ease-in-out infinite;
  }
  @keyframes btnPulse{
    0%,100%{box-shadow:0 10px 30px rgba(242,201,76,.22);}
    50%{box-shadow:0 10px 30px rgba(242,201,76,.6),0 0 0 6px rgba(242,201,76,.12);}
  }
  .progress-bar-wrap{
    max-width:600px;margin:0 auto 20px;text-align:center;
  }
  .progress-label{font-size:14px;color:var(--chalk);margin-bottom:8px;letter-spacing:1px;font-weight:bold;}
  .progress-bar-bg{
    height:12px;background:rgba(255,255,255,.1);border-radius:6px;overflow:hidden;
    border:1px solid rgba(242,201,76,.2);
  }
  .progress-bar-fill{
    height:100%;background:linear-gradient(90deg,var(--gold),#ffe28a);border-radius:6px;
    transition:width .4s ease;
    box-shadow:0 0 8px rgba(242,201,76,.3);
  }
  .stage{
    max-width:100%;
    margin:0 auto 28px;
    background:var(--panel);
    border:1px solid rgba(242,201,76,.34);
    border-radius:18px;
    padding:18px 20px;
    box-shadow:0 18px 54px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08);
    backdrop-filter:blur(14px);
  }
  .stage h2{
    margin:0 0 10px;
    font-size:16px;
    color:var(--gold);
    border-bottom:1px dashed var(--line);
    padding-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .hint{font-size:11px;color:#9fc7ad;font-weight:normal;}
  .settings-btn{background:linear-gradient(135deg,var(--gold),#ffe28a);color:#23260a;box-shadow:0 10px 30px rgba(242,201,76,.22);}
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.72);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }
  .modal-box{
    background:linear-gradient(145deg, rgba(8,32,22,.96), rgba(4,17,12,.96));
    border:1px solid rgba(242,201,76,.52);
    border-radius:24px;
    max-width:980px;
    width:100%;
    max-height:88vh;
    overflow-y:auto;
    padding:30px 24px 20px;
    position:relative;
  }
  .modal-close{
    position:absolute;
    top:14px;
    right:14px;
    background:#1d4a2d;
    border:1px solid var(--gold);
    color:var(--chalk);
    width:30px;
    height:30px;
    border-radius:50%;
    font-size:14px;
    cursor:pointer;
  }
  .modal-close:hover{background:var(--red-card);}
  .modal-done-btn{
    display:block;
    margin:18px auto 4px;
    background:var(--gold);
    color:#23260a;
    border:none;
    padding:10px 24px;
    border-radius:6px;
    font-size:13px;
    font-weight:bold;
    cursor:pointer;
  }
  .modal-done-btn:hover{background:#e6c455;}
  .modal-done-btn:disabled{background:#5d7c69;cursor:not-allowed;opacity:.6;}
  .modal-warn{color:#ff8a80;font-size:12px;text-align:center;margin-top:6px;min-height:18px;}

  .group-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:10px;
  }
  .group-card{
    background:#163c26;
    border:1px solid var(--line);
    border-radius:14px;
    padding:8px 10px;
  }
  .group-card .gtitle{
    font-size:12px;
    color:var(--gold);
    letter-spacing:1px;
    margin-bottom:6px;
    font-weight:bold;
  }
  .gteam-row{
    display:flex;
    align-items:center;
    gap:6px;
    padding:3px 0;
    font-size:12px;
    flex-wrap:wrap;
  }
  .gteam-row .gname{flex:1;}
  .gteam-row .gpts{
    min-width:34px;
    text-align:center;
    color:#ffe28a;
    font-size:11px;
    background:rgba(242,201,76,.12);
    border:1px solid rgba(242,201,76,.28);
    border-radius:999px;
    padding:2px 6px;
  }
  .rank-btn{
    border:1px solid var(--line);
    background:#0e2c1c;
    color:#9fc7ad;
    font-size:10px;
    padding:3px 7px;
    border-radius:4px;
    cursor:pointer;
  }
  .rank-btn.active-first{background:var(--gold);color:#23260a;border-color:var(--gold);font-weight:bold;}
  .rank-btn.active-second{background:#5a8a66;color:#0e2c1c;border-color:#5a8a66;font-weight:bold;}
  .group-card .gtitle{
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .group-card .pts-head{
    color:#9fc7ad;
    font-size:10px;
    font-weight:normal;
  }
  .group-card .gplayed{
    color:#9fc7ad;
    font-size:10px;
    font-weight:normal;
  }
  .status-tag{
    font-size:9px;
    padding:2px 6px;
    border-radius:999px;
    font-weight:bold;
    letter-spacing:0.5px;
    flex-shrink:0;
  }
  .status-tag.qual{background:rgba(90,206,120,.22);color:#7fe6a0;border:1px solid rgba(90,206,120,.5);}
  .status-tag.elim{background:rgba(216,68,58,.22);color:#ff8a80;border:1px solid rgba(216,68,58,.5);}

  .third-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:8px;
  }
  .third-pick{
    display:flex;
    align-items:center;
    gap:6px;
    background:#163c26;
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px 8px;
    font-size:13px;
    cursor:pointer;
  }
  .third-pick.checked{
    border-color:var(--gold);
    background:#2a4a30;
  }
  .third-pick input{accent-color:var(--gold);}
  .third-count{font-size:12px;}
  .third-count.bad{color:#ff8a80;}
  .third-count.good{color:#9fe6a0;}

  .round-row{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:6px;
    margin-bottom:14px;
    align-items:stretch;
    justify-content:center;
  }
  .round-col{
    min-width:200px;
    display:flex;
    flex-direction:column;
    gap:8px;
    justify-content:space-around;
  }
  .round-col.r32-col{min-width:215px;}
  .center-col{
    min-width:230px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:10px;
  }
  .center-col .sf-pair{
    display:flex;
    flex-direction:column;
    gap:18px;
    justify-content:space-around;
    flex:1;
  }
  .mini-trophy{
    text-align:center;
    background:linear-gradient(160deg,#2a210a,#1a1406);
    border:2px solid var(--gold);
    border-radius:10px;
    padding:14px 10px;
    margin:8px 0;
  }
  .mini-trophy .label{font-size:10px;letter-spacing:1px;color:#e0c060;}
  .mini-trophy .champ{font-size:18px;color:var(--gold);margin-top:4px;min-height:22px;}
  .round-title{
    text-align:center;
    font-size:11px;
    letter-spacing:1px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:2px;
  }
  .match{
    background:linear-gradient(180deg, rgba(21,64,41,.98), rgba(10,39,25,.98));
    border:1px solid rgba(255,255,255,.12);
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 6px 16px rgba(0,0,0,.2);
    transition:.2s ease;
  }
  .match:hover{transform:translateY(-1px);border-color:rgba(242,201,76,.42);}
  .match-id{
    font-size:9px;
    background:linear-gradient(90deg, rgba(242,201,76,.24), rgba(47,118,80,.82));
    padding:1px 6px;
    color:#dff0e4;
    letter-spacing:1px;
  }
  .match-note{
    font-size:9px;
    color:#9fc7ad;
    padding:2px 6px 0;
    letter-spacing:1px;
    line-height:1.2;
  }
  .team-btn{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:transparent;
    border:none;
    color:var(--chalk);
    font-size:14px;
    padding:7px 10px;
    cursor:pointer;
    text-align:left;
    border-bottom:1px solid #1d4a2d;
  }
  .team-btn:last-child{border-bottom:none;}
  .team-btn:hover{background:#1a4329;}
  .team-btn.winner{
    background:linear-gradient(135deg,var(--gold),#ffe28a);
    color:#23260a;
    font-weight:bold;
  }
  .team-btn.empty{color:#5d7c69;cursor:default;}
  .team-btn .tag{font-size:9px;color:#9fc7ad;}
  .team-btn.winner .tag{color:#5a4d10;}
  .team-btn .slot-label{font-size:11px;color:rgba(242,201,76,.7);margin-left:6px;font-weight:normal;}
  .team-btn.winner .slot-label{color:rgba(35,38,10,.6);}
  .team-btn .click-hint{font-size:10px;color:rgba(242,201,76,.65);margin-left:auto;padding-left:8px;flex-shrink:0;}
  .team-btn.empty .click-hint,.team-btn.winner .click-hint{display:none;}
  .team-btn:not(.empty):not(.winner):hover{
    background:rgba(242,201,76,.12);
    border-color:rgba(242,201,76,.3);
  }
  .team-btn:not(.empty):not(.winner):hover .click-hint{color:var(--gold);}

  .final-zone{
    max-width:600px;
    margin:28px auto 0;
    text-align:center;
  }
  .trophy-box{
    background:linear-gradient(160deg,#2a210a,#1a1406);
    border:3px solid var(--gold);
    border-radius:16px;
    padding:30px 24px;
    box-shadow:0 0 40px rgba(242,201,76,.18), inset 0 0 30px rgba(242,201,76,.06);
    transition:.3s ease;
  }
  .trophy-box.has-champion{
    animation:champGlow 2s ease-in-out infinite alternate;
  }
  @keyframes champGlow{
    from{box-shadow:0 0 30px rgba(242,201,76,.18), inset 0 0 20px rgba(242,201,76,.06);}
    to{box-shadow:0 0 60px rgba(242,201,76,.32), inset 0 0 40px rgba(242,201,76,.1);}
  }
  .trophy-box .label{font-size:12px;letter-spacing:3px;color:#e0c060;text-transform:uppercase;}
  .champion-name{
    font-size:38px;
    margin:12px 0 6px;
    color:var(--gold);
    text-shadow:0 0 16px rgba(212,175,55,.5);
  }
  .champion-placeholder{
    font-size:18px;
    color:#7a6f4a;
  }
  .reset-btn{
    display:block;
    margin:24px auto 0;
    background:var(--red-card);
    color:#fff;
    border:none;
    padding:10px 22px;
    border-radius:999px;
    font-size:13px;
    cursor:pointer;
    letter-spacing:1px;
  }
  .reset-btn:hover{background:#8c1b14;}
  .vs-mini{font-size:10px;color:#7fae8f;text-align:center;margin:-6px 0 6px;}
  ::-webkit-scrollbar{height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px;}
  @media (max-width:900px){
    body{padding:16px;}
    body::before{display:none;}
    .hero{padding:20px;border-radius:18px;}
    h1,.subtitle{text-align:center;}
    .eyebrow{margin:0 auto;}
    .hero-actions{justify-content:center;}
  }
  @media (max-width:640px){
    body{padding:10px;}
    h1{font-size:22px;letter-spacing:1px;}
    .subtitle{font-size:12px;}
    .hero{padding:14px 12px;border-radius:14px;}
    .hero-actions{gap:8px;}
    .ghost-btn,.settings-btn{padding:10px 14px;font-size:12px;}
    .steps-guide{gap:6px;padding:10px 12px;}
    .step-item{font-size:12px;gap:4px;}
    .step-num{width:22px;height:22px;font-size:11px;}
    .step-arrow{font-size:14px;}
    .stage{padding:12px 10px;border-radius:12px;}
    .group-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;}
    .round-row{gap:6px;padding-bottom:6px;}
    .round-col{min-width:150px;gap:8px;}
    .round-col.r32-col{min-width:160px;}
    .center-col{min-width:170px;}
    .team-btn{font-size:12px;padding:5px 7px;}
    .match-id{font-size:9px;}
    .match-note{font-size:9px;}
    .trophy-box{padding:18px 14px;}
    .champion-name{font-size:26px;}
    .modal-box{padding:18px 12px 14px;border-radius:16px;}
    .modal-close{top:8px;right:8px;width:26px;height:26px;font-size:12px;}
  }
</style>
</head>
<body>
<div class="page-shell">
<section class="hero">
  <div class="hero-top">
    <div>
      <div class="eyebrow">🏟️ FIFA WORLD CUP 2026 · BRACKET LAB</div>
      <h1>2026 FIFA <span>世界杯</span><br>夺冠预测器</h1>
      <div class="subtitle">点击球队即可选择晋级方，设置小组名次后自动刷新对阵。从小组赛到决赛，一步步预测你的冠军！</div>
      <div class="hero-actions">
        <button class="settings-btn" onclick="openModal()">⚙ 设置小组名次与第三名晋级</button>
        <a class="ghost-btn" href="#bracketArea">查看淘汰赛对阵 ↓</a>
      </div>
    </div>
  </div>
</section>

<div class="toolbar">
  <button class="settings-btn" onclick="openModal()">⚙ 设置小组名次与第三名晋级</button>
</div>

<div class="steps-guide" id="stepsGuide">
  <div class="step-item" id="step1"><span class="step-num">1</span>设置小组1/2名</div>
  <span class="step-arrow">›</span>
  <div class="step-item" id="step2"><span class="step-num">2</span>选择8个最佳第三名</div>
  <span class="step-arrow">›</span>
  <div class="step-item" id="step3"><span class="step-num">3</span>点击对阵图选择晋级球队</div>
  <span class="step-arrow">›</span>
  <div class="step-item" id="step4"><span class="step-num">4</span>得出冠军预测！</div>
</div>

<div class="next-action" id="nextAction"></div>

<div class="progress-bar-wrap">
  <div class="progress-label" id="groupProgressLabel">小组赛进行中：— / — 场</div>
  <div class="progress-label" id="progressLabel">淘汰赛预测进度：0 / 31</div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div id="modalOverlay" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="stage">
      <h2>第一步：选择各小组的1/2名 <span class="hint" id="groupHint">默认按当前积分榜排名，可自行修改</span></h2>
      <div class="group-grid" id="groupGrid"></div>
    </div>

    <div class="stage">
      <h2>第二步：选择8个最佳小组第三名 <span class="hint" id="thirdHint"></span></h2>
      <div class="third-grid" id="thirdGrid"></div>
    </div>
    <button class="modal-done-btn" id="modalDoneBtn" onclick="tryCloseModal()">完成设置，查看对阵</button>
    <div class="modal-warn" id="modalWarn"></div>
  </div>
</div>

<div id="bracketArea"></div>

<div class="final-zone" id="finalZone">
  <div class="trophy-box" id="trophyBox">
    <div class="label">FIFA WORLD CUP CHAMPION</div>
    <div class="champion-placeholder" id="championDisplay">完成对阵选择，预测你的冠军</div>
  </div>
  <button class="reset-btn" onclick="resetAll()">重新预测</button>
</div>

</div>

<script>
/* ---------- 小组赛数据（来自积分榜图） ---------- */
const groups = {
  A:["墨西哥","韩国","捷克","南非"],
  B:["加拿大","瑞士","波黑","卡塔尔"],
  C:["巴西","摩洛哥","苏格兰","海地"],
  D:["美国","澳大利亚","巴拉圭","土耳其"],
  E:["德国","科特迪瓦","厄瓜多尔","库拉索"],
  F:["荷兰","日本","瑞典","突尼斯"],
  G:["埃及","伊朗","比利时","新西兰"],
  H:["西班牙","乌拉圭","佛得角","沙特阿拉伯"],
  I:["法国","挪威","塞内加尔","伊拉克"],
  J:["阿根廷","奥地利","阿尔及利亚","约旦"],
  K:["哥伦比亚","葡萄牙","刚果(金)","乌兹别克斯坦"],
  L:["英格兰","加纳","克罗地亚","巴拿马"]
};
// 当前积分：按 groups[g] 中球队顺序一一对应。
// 后续第三场结束后，只需要更新这里的分数；配置页积分展示、默认第三名排序会自动同步。
const points = {
  A:[6,3,1,1], B:[4,7,4,1], C:[7,7,3,0], D:[6,3,3,0],
  E:[6,3,1,1], F:[4,4,3,0], G:[4,2,2,1], H:[4,2,2,1],
  I:[6,6,0,0], J:[6,3,3,0], K:[6,4,1,0], L:[4,4,3,0]
};
// 每队已踢场次（胜+平+负），与 groups[g] 顺序一一对应。每组小组赛共3轮。
const games = {
  A:[2,2,2,2], B:[3,3,3,3], C:[3,3,3,3], D:[2,2,2,2],
  E:[2,2,2,2], F:[2,2,2,2], G:[2,2,2,2], H:[2,2,2,2],
  I:[2,2,2,2], J:[2,2,2,2], K:[2,2,2,2], L:[2,2,2,2]
};
const GROUP_TOTAL_ROUNDS = 3;
function ptsOf(g, team){
  const idx = groups[g].indexOf(team);
  return points[g][idx];
}
function gamesOf(g, team){
  const idx = groups[g].indexOf(team);
  return games[g][idx];
}
function groupPlayedCount(g){
  // 每场比赛涉及2队，场次 = 各队已赛场次之和 / 2
  return games[g].reduce((s,n)=>s+n,0) / 2;
}
function groupTotalCount(){
  // 4队循环赛，共 C(4,2)=6 场
  return 4*3/2;
}
function overallGroupProgress(){
  let played = 0, total = 0;
  Object.keys(groups).forEach(g=>{
    played += groupPlayedCount(g);
    total += groupTotalCount();
  });
  return { played, total };
}
/* 数学晋级判定（基于当前积分与各组剩余场次，未考虑净胜球，仅供参考） */
function remainingRounds(g, team){
  return GROUP_TOTAL_ROUNDS - gamesOf(g, team);
}
function clinchStatus(g, team){
  const remain = remainingRounds(g, team);
  const pts = ptsOf(g, team);
  const xMin = pts; // 最差情况：剩余场次全负，积分不变
  const others = groups[g].filter(t=>t!==team);
  const exceedCount = others.filter(o=>{
    const oMax = ptsOf(g,o) + 3*remainingRounds(g,o);
    return oMax > xMin;
  }).length;
  if(exceedCount <= 1) return 'qualified'; // 最多1队能反超，必定锁定前2
  const xMax = pts + 3*remain; // 最好情况：剩余场次全胜
  // 注意：小组第3名仍有机会凭"8个最佳第三名"晋级，并非出局；
  // 只有被另外3队全部锁定超过自己理论最高分（即确定垫底第4）才算真正出局
  const aheadCount = others.filter(o => ptsOf(g,o) > xMax).length;
  if(aheadCount >= 3) return 'eliminated';
  return 'pending';
}

/* ---------- 小组1/2名状态（默认=当前排名，可由用户修改） ---------- */
let groupPicks = {}; // g -> {first:teamName, second:teamName}
Object.keys(groups).forEach(g=>{
  const sorted = [...groups[g]].sort((a,b)=> ptsOf(g,b)-ptsOf(g,a));
  groupPicks[g] = { first: sorted[0], second: sorted[1] };
});

function first(g){ return groupPicks[g].first; }
function second(g){ return groupPicks[g].second; }
function thirdFourth(g){
  const remain = groups[g].filter(t => t!==groupPicks[g].first && t!==groupPicks[g].second);
  remain.sort((a,b)=> ptsOf(g,b)-ptsOf(g,a));
  return { third: remain[0], fourth: remain[1] };
}
function third(g){ return thirdFourth(g).third; }

/* ---------- 8个最佳第三名（动态计算，随小组1/2名选择变化） ---------- */
function getThirdCandidates(){
  return Object.keys(groups).map(g=>{
    const t = third(g);
    return { group:g, team:t, pts:ptsOf(g,t) };
  }).filter(c=>clinchStatus(c.group, c.team)!=='eliminated')
    .sort((a,b)=>b.pts-a.pts);
}
let selectedThirds = new Set(getThirdCandidates().slice(0,8).map(c=>c.group));

/* ---------- 1/16决赛对阵：分成4个象限（对应赛程图的左上/左下/右上/右下） ---------- */
// 每象限4场，按 [m1,m2,m3,m4] 排列，m1+m2 -> 八分之一决赛A，m3+m4 -> 八分之一决赛B
const quadrants = [
  { // Q1 左上（蓝）
    r32:[
      {id:"M74", a:{type:'1',g:'E'}, b:{type:'3set', letters:'ABCDF'}},
      {id:"M77", a:{type:'1',g:'I'}, b:{type:'3set', letters:'CDFGH'}},
      {id:"M73", a:{type:'2',g:'A'}, b:{type:'2',g:'B'}},
      {id:"M75", a:{type:'1',g:'F'}, b:{type:'2',g:'C'}},
    ],
    r16ids:["M89","M90"], qfid:"M97"
  },
  { // Q2 左下（绿）
    r32:[
      {id:"M83", a:{type:'2',g:'K'}, b:{type:'2',g:'L'}},
      {id:"M84", a:{type:'1',g:'H'}, b:{type:'2',g:'J'}},
      {id:"M81", a:{type:'1',g:'D'}, b:{type:'3set', letters:'BEFIJ'}},
      {id:"M82", a:{type:'1',g:'G'}, b:{type:'3set', letters:'AEHIJ'}},
    ],
    r16ids:["M93","M94"], qfid:"M98"
  },
  { // Q3 右上（绿）
    r32:[
      {id:"M76", a:{type:'1',g:'C'}, b:{type:'2',g:'F'}},
      {id:"M78", a:{type:'2',g:'E'}, b:{type:'2',g:'I'}},
      {id:"M79", a:{type:'1',g:'A'}, b:{type:'3set', letters:'CEFHI'}},
      {id:"M80", a:{type:'1',g:'L'}, b:{type:'3set', letters:'EHIJK'}},
    ],
    r16ids:["M91","M92"], qfid:"M99"
  },
  { // Q4 右下（红）
    r32:[
      {id:"M86", a:{type:'1',g:'J'}, b:{type:'2',g:'H'}},
      {id:"M88", a:{type:'2',g:'D'}, b:{type:'2',g:'G'}},
      {id:"M85", a:{type:'1',g:'B'}, b:{type:'3set', letters:'EFGIJ'}},
      {id:"M87", a:{type:'1',g:'K'}, b:{type:'3set', letters:'DEIJL'}},
    ],
    r16ids:["M95","M96"], qfid:"M100"
  },
];
const r32 = quadrants.flatMap(q=>q.r32); // 扁平化，仅用于第三名分配等通用逻辑
const sfids = ["M101","M102"]; // M101: Q1+Q2 -> 左半决赛, M102: Q3+Q4 -> 右半决赛
const finalId = "M104";

/* ---------- 状态：每场比赛的获胜者 ---------- */
let winners = {}; // matchId -> teamName

function teamFromSlot(slot){
  if(slot.type==='1') return first(slot.g);
  if(slot.type==='2') return second(slot.g);
  if(slot.type==='3set'){
    // 在已选的8个第三名中，找属于 letters 的那个，且尚未被其它槛位占用
    const letters = slot.letters.split('');
    for(const l of letters){
      if(selectedThirds.has(l)) return {pending:true, letters:slot.letters, resolveGroup:l};
    }
    return null;
  }
}

/* 用简单的回溯匹配，把8个已选第三名分配到8个3set槛位，保证一一对应 */
function assignThirds(){
  const slots = r32.filter(m=>m.a.type==='3set'||m.b.type==='3set')
                    .map(m=> m.a.type==='3set'? m.a : m.b);
  const letters = [...selectedThirds];
  const assignment = {}; // slotIndex -> letter
  function backtrack(i, used){
    if(i===slots.length) return {...assignment};
    const slot = slots[i];
    const options = slot.letters.split('').filter(l=>letters.includes(l) && !used.has(l));
    for(const l of options){
      assignment[i]=l;
      used.add(l);
      const res = backtrack(i+1, used);
      if(res) return res;
      used.delete(l);
      delete assignment[i];
    }
    return null;
  }
  const result = backtrack(0, new Set());
  // 映射回 slot对象引用
  const map = new Map();
  if(result){
    slots.forEach((slot,i)=>{ map.set(slot, result[i]); });
  }
  return map;
}
let thirdAssignmentMap = new Map();

function slotTeamName(slot){
  if(slot.type==='1') return first(slot.g);
  if(slot.type==='2') return second(slot.g);
  if(slot.type==='3set'){
    const letter = thirdAssignmentMap.get(slot);
    if(!letter) return null;
    return third(letter)+ " (第3名)";
  }
}

    card.appendChild(title);

      const statusHtml = status==='qualified' ? '<span class="status-tag qual">✅晋级</span>'

      `;
      row.querySelector('[data-role="first"]').addEventListener('click', ()=>{
        if(groupPicks[g].second === team) groupPicks[g].second = groups[g].find(t=>t!==team && t!==groupPicks[g].first);
        groupPicks[g].first = team;
        onGroupPicksChanged();
      });
      row.querySelector('[data-role="second"]').addEventListener('click', ()=>{
        if(groupPicks[g].first === team) groupPicks[g].first = groups[g].find(t=>t!==team && t!==groupPicks[g].second);
        groupPicks[g].second = team;
        onGroupPicksChanged();
      });
      card.appendChild(row);
    });
    grid.appendChild(card);
  });
  updateGroupProgressLabel();
}
function updateGroupProgressLabel(){
  const { played, total } = overallGroupProgress();
  const label = document.getElementById('groupProgressLabel');
  if(label){
    const done = played>=total;
    label.textContent = done
      ? `小组赛已全部结束：${played} / ${total} 场`
      : `小组赛进行中：已赛 ${played} / ${total} 场`;
  }
}
function onGroupPicksChanged(){
  // 小组名次变了，第三名候选池也变了：重新选出默认最佳8个第三名
  selectedThirds = new Set(getThirdCandidates().slice(0,8).map(c=>c.group));
  renderGroupGrid();
  renderThirdGrid();
  recomputeAndRender();
}

function renderThirdGrid(){
  const grid = document.getElementById('thirdGrid');
  grid.innerHTML = '';
  const thirdCandidates = getThirdCandidates();
  thirdCandidates.forEach(c=>{
    const div = document.createElement('label');
    div.className = 'third-pick'+(selectedThirds.has(c.group)?' checked':'');
    div.innerHTML = `<input type="checkbox" ${selectedThirds.has(c.group)?'checked':''} data-g="${c.group}"/> ${c.group}组 ${c.team} <span style="margin-left:auto;color:#9fc7ad">${c.pts}分</span>`;
    div.querySelector('input').addEventListener('change', e=>{
      if(e.target.checked) selectedThirds.add(c.group);

  updateThirdHint();
}
function updateThirdHint(){
  const hint = document.getElementById('thirdHint');
  const n = selectedThirds.size;
  hint.textContent = `已选 ${n}/8`;
  hint.className = 'third-count ' + (n===8?'good':'bad');

  else if(warn && n !== 8) warn.textContent = `⚠ 请恰好选择8个最佳第三名（当前已选 ${n} 个）`;
}
function onThirdsChanged(){
  renderThirdGrid();
  recomputeAndRender();
}

function getWinnerOf(matchId){ return winners[matchId] || null; }

function renderBracket(){
  thirdAssignmentMap = assignThirds();
  const area = document.getElementById('bracketArea');
  area.innerHTML = '';

  // 计算每个象限的 R16 / QF 胜者
  function quadR16Matches(q){
    const m1 = buildMatch(q.r32[0].id, slotTeamName(q.r32[0].a), slotTeamName(q.r32[0].b), slotLabel(q.r32[0].a), slotLabel(q.r32[0].b));
    const m2 = buildMatch(q.r32[1].id, slotTeamName(q.r32[1].a), slotTeamName(q.r32[1].b), slotLabel(q.r32[1].a), slotLabel(q.r32[1].b));
    const m3 = buildMatch(q.r32[2].id, slotTeamName(q.r32[2].a), slotTeamName(q.r32[2].b), slotLabel(q.r32[2].a), slotLabel(q.r32[2].b));
    const m4 = buildMatch(q.r32[3].id, slotTeamName(q.r32[3].a), slotTeamName(q.r32[3].b), slotLabel(q.r32[3].a), slotLabel(q.r32[3].b));
    return [m1,m2,m3,m4];
  }
  function quadR16Winners(q){
    return [
      buildMatch(q.r16ids[0], getWinnerOf(q.r32[0].id), getWinnerOf(q.r32[1].id)),
      buildMatch(q.r16ids[1], getWinnerOf(q.r32[2].id), getWinnerOf(q.r32[3].id)),
    ];
  }
  function quadQF(q){
    return buildMatch(q.qfid, getWinnerOf(q.r16ids[0]), getWinnerOf(q.r16ids[1]));
  }

  const [Q1,Q2,Q3,Q4] = quadrants;

  // 左侧：R32(Q1+Q2八场) | R16(四场) | QF(两场)
  const leftR32 = makeCol("1/16决赛", [...quadR16Matches(Q1), ...quadR16Matches(Q2)], true);
  const leftR16 = makeCol("1/8决赛", [...quadR16Winners(Q1), ...quadR16Winners(Q2)]);
  const leftQF  = makeCol("1/4决赛", [quadQF(Q1), quadQF(Q2)]);

  // 右侧：QF(两场) | R16(四场) | R32(Q3+Q4八场)
  const rightQF  = makeCol("1/4决赛", [quadQF(Q3), quadQF(Q4)]);
  const rightR16 = makeCol("1/8决赛", [...quadR16Winners(Q3), ...quadR16Winners(Q4)]);
  const rightR32 = makeCol("1/16决赛", [...quadR16Matches(Q3), ...quadR16Matches(Q4)], true);

  // 中间：半决赛 + 决赛 + 冠军
  const sfA = buildMatch(sfids[0], getWinnerOf(Q1.qfid), getWinnerOf(Q2.qfid));
  const sfB = buildMatch(sfids[1], getWinnerOf(Q3.qfid), getWinnerOf(Q4.qfid));
  const finalMatch = buildMatch(finalId, getWinnerOf(sfids[0]), getWinnerOf(sfids[1]));

  const centerCol = document.createElement('div');
  centerCol.className = 'center-col';
  const sfTitle = document.createElement('div');
  sfTitle.className='round-title'; sfTitle.textContent='半决赛';
  centerCol.appendChild(sfTitle);
  centerCol.appendChild(sfA);
  centerCol.appendChild(sfB);
  const finalTitle = document.createElement('div');
  finalTitle.className='round-title'; finalTitle.textContent='决赛';
  centerCol.appendChild(finalTitle);
  centerCol.appendChild(finalMatch);

  // 更新底部冠军展示区
  const champ = getWinnerOf(finalId);
  const champDisplay = document.getElementById('championDisplay');
  const trophyBox = document.getElementById('trophyBox');
  if(champ){
    champDisplay.className = 'champion-name';
    champDisplay.textContent = '🏆 ' + champ;
    trophyBox.classList.add('has-champion');
  } else {
    champDisplay.className = 'champion-placeholder';
    champDisplay.textContent = '完成对阵选择，预测你的冠军';
    trophyBox.classList.remove('has-champion');
  }

  const row = document.createElement('div');
  row.className = 'round-row';
  [leftR32, leftR16, leftQF, centerCol, rightQF, rightR16, rightR32].forEach(c=>row.appendChild(c));
  area.appendChild(row);
}

function makeCol(title, matchEls, isR32){
  const col = document.createElement('div');
  col.className = 'round-col' + (isR32 ? ' r32-col' : '');
  const t = document.createElement('div');
  t.className='round-title';
  t.textContent = title;
  col.appendChild(t);
  matchEls.forEach(m=>col.appendChild(m));
  return col;
}

function slotLabel(slot){
  if(slot.type==='1') return `1${slot.g}`;
  if(slot.type==='2') return `2${slot.g}`;
  if(slot.type==='3set') return `3${slot.letters}`;
  return '';
}

function buildMatch(matchId, nameA, nameB, labelA, labelB){
  const wrap = document.createElement('div');
  wrap.className = 'match';
  const tag = document.createElement('div');
  tag.className='match-id';
  tag.textContent = matchId;
  wrap.appendChild(tag);

  [['a',nameA,labelA],['b',nameB,labelB]].forEach(([side,name,label])=>{
    const btn = document.createElement('button');
    const isWinner = winners[matchId] === name && name;
    btn.className = 'team-btn' + (isWinner?' winner':'') + (!name?' empty':'');
    if(name){
      const realName = typeof name==='object' ? null : name;
      const labelHtml = label ? `<span class="slot-label">${label}</span>` : '';
      const hintHtml = isWinner ? '' : '<span class="click-hint">点这里晋级 ›</span>';
      btn.innerHTML = `<span>${realName||'待定'}${labelHtml}</span>` + (isWinner?'<span class="tag">✓晋级</span>':hintHtml);
      btn.addEventListener('click',()=>{
        if(!name) return;
        winners[matchId] = name;
        cascadeReset(matchId);
        recomputeAndRender();
      });
    } else {
      const labelHtml = label ? `<span class="slot-label">${label}</span>` : '';
      btn.innerHTML = `<span>待定上一轮结果${labelHtml}</span>`;
    }
    wrap.appendChild(btn);
  });
  return wrap;
}

/* 当某场比赛的结果改变时，清除后续依赖它的所有已选结果 */
const directDependents = {}; // matchId -> [matchId that consumes its winner]
function addDep(parent, child){
  if(!directDependents[parent]) directDependents[parent]=[];
  directDependents[parent].push(child);
}
quadrants.forEach(q=>{
  addDep(q.r32[0].id, q.r16ids[0]);
  addDep(q.r32[1].id, q.r16ids[0]);
  addDep(q.r32[2].id, q.r16ids[1]);
  addDep(q.r32[3].id, q.r16ids[1]);
  addDep(q.r16ids[0], q.qfid);
  addDep(q.r16ids[1], q.qfid);
});
addDep(quadrants[0].qfid, sfids[0]);
addDep(quadrants[1].qfid, sfids[0]);
addDep(quadrants[2].qfid, sfids[1]);
addDep(quadrants[3].qfid, sfids[1]);
addDep(sfids[0], finalId);
addDep(sfids[1], finalId);

function cascadeReset(changedId){
  const queue = [...(directDependents[changedId]||[])];
  const seen = new Set();
  while(queue.length){
    const id = queue.shift();
    if(seen.has(id)) continue;
    seen.add(id);
    delete winners[id];
    (directDependents[id]||[]).forEach(d=>queue.push(d));
  }
}

function recomputeAndRender(){
  renderBracket();
  updateProgress();
}

function updateProgress(){
  // 总比赛数：16(R32) + 8(R16) + 4(QF) + 2(SF) + 1(Final) = 31
  const allMatchIds = [
    ...r32.map(m=>m.id),
    ...quadrants.flatMap(q=>q.r16ids),
    ...quadrants.map(q=>q.qfid),
    ...sfids,
    finalId
  ];
  const total = allMatchIds.length;
  const decided = allMatchIds.filter(id=>winners[id]).length;
  const pct = Math.round(decided/total*100);
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  if(fill) fill.style.width = pct+'%';
  if(label) label.textContent = `淘汰赛预测进度：${decided} / ${total}`;

  // 更新步骤状态
  const s1 = document.getElementById('step1');
  const s2 = document.getElementById('step2');
  const s3 = document.getElementById('step3');
  const s4 = document.getElementById('step4');
  // 步骤1: 用户打开过设置弹窗即算完成（简化判断：默认已有groupPicks）
  if(s1) s1.classList.add('done');
  // 步骤2: 第三名选了8个
  const thirdsDone = selectedThirds.size===8;
  if(s2) s2.classList.toggle('done', thirdsDone);
  // 步骤3: 至少选了一场比赛
  if(s3) s3.classList.toggle('done', decided>0);
  // 步骤4: 选出了冠军
  const champion = !!getWinnerOf(finalId);
  if(s4) s4.classList.toggle('done', champion);

  // 动态操作指引 + 设置按钮呼吸提示
  const nextAction = document.getElementById('nextAction');
  const settingsBtns = document.querySelectorAll('.settings-btn');
  let guideText = '';
  let pulseSettings = false;
  if(!thirdsDone){
    guideText = '👉 第一步：点击上方「⚙ 设置小组名次与第三名晋级」，确认各组1/2名，并勾选8个最佳第三名';
    pulseSettings = true;
  } else if(champion){
    guideText = `🏆 预测完成！冠军是 ${getWinnerOf(finalId)}，可点击「重新预测」换一种结果`;
  } else if(decided === 0){
    guideText = '👉 第二步：在下方对阵图中，点击你认为会获胜的球队名称（按钮上写着"点这里晋级"），让它晋级下一轮';
  } else {
    guideText = `👉 继续点击对阵图中的球队，完成剩余 ${total - decided} 场比赛的晋级选择，直到选出冠军`;
  }
  if(nextAction) nextAction.textContent = guideText;
  settingsBtns.forEach(b=>b.classList.toggle('pulse', pulseSettings));
}

function resetAll(){
  winners = {};
  Object.keys(groups).forEach(g=>{
    const sorted = [...groups[g]].sort((a,b)=> ptsOf(g,b)-ptsOf(g,a));
    groupPicks[g] = { first: sorted[0], second: sorted[1] };
  });
  selectedThirds = new Set(getThirdCandidates().slice(0,8).map(c=>c.group));
  renderGroupGrid();
  renderThirdGrid();
  recomputeAndRender();
}

/* init */
renderGroupGrid();
renderThirdGrid();
recomputeAndRender();
</script>
